<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Served for deep links like /dataset/<hash> too, so anchor assets must
         resolve from the site root rather than the current path. -->
    <base href="/" />
    <title>BitTorrent swarm — overview</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d1117;
        --panel: #161b22;
        --border: #30363d;
        --fg: #c9d1d9;
        --muted: #8b949e;
        --accent: #58a6ff;
        --ok: #3fb950;
        --bad: #f85149;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 1.25rem 1.5rem 3rem;
        background: var(--bg);
        color: var(--fg);
        font: 14px/1.45 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      h1 {
        font-size: 1.15rem;
        margin: 0;
      }
      h2 {
        font-size: 1rem;
        margin: 0 0 0.15rem;
      }
      h3 {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted);
        margin: 1rem 0 0.4rem;
      }
      .muted {
        color: var(--muted);
        font-weight: 400;
      }
      .small {
        font-size: 0.8rem;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding-bottom: 0.75rem;
        border-bottom: 1px solid var(--border);
        margin-bottom: 1rem;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }
      .pill {
        font-size: 0.75rem;
        font-weight: 600;
        padding: 0.15rem 0.55rem;
        border-radius: 999px;
        border: 1px solid var(--border);
      }
      .pill.live {
        color: var(--ok);
        border-color: var(--ok);
      }
      .pill.error {
        color: var(--bad);
        border-color: var(--bad);
      }
      .pill.connecting {
        color: var(--muted);
      }

      .banner {
        background: rgba(248, 81, 73, 0.12);
        border: 1px solid var(--bad);
        color: #ffa198;
        border-radius: 6px;
        padding: 0.5rem 0.75rem;
        margin-bottom: 1rem;
      }
      .empty {
        color: var(--muted);
        padding: 2rem 0;
      }
      /* Newly-added-dataset toast: a green info banner with a dismiss button. */
      .toast {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        background: rgba(63, 185, 80, 0.12);
        border: 1px solid var(--ok);
        color: #7ee2a8;
        border-radius: 6px;
        padding: 0.5rem 0.75rem;
        margin-bottom: 1rem;
      }
      .toast-dot {
        width: 0.5rem;
        height: 0.5rem;
        border-radius: 50%;
        background: var(--ok);
        flex: none;
      }
      .toast-close {
        margin-left: auto;
        background: none;
        border: none;
        color: inherit;
        font-size: 1.1rem;
        line-height: 1;
        cursor: pointer;
        padding: 0 0.25rem;
      }

      .torrent {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 1rem 1.1rem;
        margin-bottom: 1.25rem;
      }

      .summary {
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
        margin: 0.75rem 0 0.25rem;
      }
      .stat {
        display: flex;
        flex-direction: column;
        gap: 0.1rem;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 0.45rem 0.7rem;
        min-width: 7rem;
      }
      .num {
        font-size: 1.2rem;
        font-weight: 600;
      }
      .num.ok {
        color: var(--ok);
      }
      .num.bad {
        color: var(--bad);
      }
      .num.warn {
        color: #d29922;
      }

      /* --- Overview (list) screen --- */
      .dataset-head,
      .datasetrow {
        display: grid;
        grid-template-columns: 2fr 6rem 5rem 1fr 13rem;
        gap: 0.75rem;
        align-items: center;
      }
      .dataset-head {
        color: var(--muted);
        font-weight: 600;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        padding: 0 0.6rem 0.3rem;
        border-bottom: 1px solid var(--border);
        margin-bottom: 0.4rem;
      }
      .datasetrow {
        padding: 0.5rem 0.6rem;
        border: 1px solid var(--border);
        border-radius: 6px;
        margin-bottom: 0.4rem;
        background: var(--panel);
        text-decoration: none;
        color: var(--fg);
      }
      .datasetrow:hover {
        border-color: var(--accent);
      }
      .dname {
        font-weight: 600;
      }
      .dsub {
        color: var(--muted);
        font-size: 0.72rem;
      }
      .dsize,
      .dcopies {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      .dcopies .num {
        font-size: 1.05rem;
        font-weight: 600;
      }
      .dstate {
        text-align: right;
        font-size: 0.8rem;
      }
      .dstate.replicating {
        color: var(--accent);
      }
      .dstate.complete {
        color: var(--muted);
      }
      .tnum {
        text-align: right;
      }
      .back {
        display: inline-block;
        margin-bottom: 1rem;
        color: var(--accent);
        text-decoration: none;
        font-size: 0.85rem;
      }
      .back:hover {
        text-decoration: underline;
      }

      /* --- top nav tabs --- */
      .tabs {
        display: flex;
        gap: 0.25rem;
        margin-bottom: 1rem;
      }
      .tab {
        padding: 0.3rem 0.8rem;
        border-radius: 6px;
        text-decoration: none;
        color: var(--muted);
        border: 1px solid transparent;
      }
      .tab:hover {
        color: var(--fg);
      }
      .tab.active {
        color: var(--fg);
        background: var(--panel);
        border-color: var(--border);
      }

      /* --- Transfers screen --- */
      .transfer-head,
      .transferrow {
        display: grid;
        grid-template-columns: 1.5fr 3rem 1fr 4rem 7rem 6rem 3rem;
        gap: 0.75rem;
        align-items: center;
      }
      .transfer-head {
        color: var(--muted);
        font-weight: 600;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        padding: 0 0.6rem 0.3rem;
        border-bottom: 1px solid var(--border);
        margin-bottom: 0.4rem;
      }
      .transferrow {
        padding: 0.4rem 0.6rem;
        border-bottom: 1px solid rgba(48, 54, 61, 0.5);
        font-size: 13px;
      }
      .tlink {
        color: var(--fg);
        text-decoration: none;
        font-weight: 600;
      }
      .tlink:hover {
        color: var(--accent);
      }
      .pbar {
        position: relative;
        height: 12px;
        background: #21262d;
        border-radius: 6px;
        overflow: hidden;
      }
      .pbar-fill {
        position: absolute;
        inset: 0 auto 0 0;
        background: var(--accent);
      }
      .pbar-fill.stalled {
        background: #6e7681;
      }

      /* --- Nodes screen --- */
      .node-head,
      .noderow2 {
        display: grid;
        grid-template-columns: 1fr 6rem 6rem 8rem 7rem 7rem 4rem;
        gap: 0.75rem;
        align-items: center;
      }
      .node-head {
        color: var(--muted);
        font-weight: 600;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        padding: 0 0.6rem 0.3rem;
        border-bottom: 1px solid var(--border);
        margin-bottom: 0.4rem;
      }
      .noderow2 {
        padding: 0.45rem 0.6rem;
        border-bottom: 1px solid rgba(48, 54, 61, 0.5);
        font-size: 13px;
      }
      .nnum {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      .noderow2:hover {
        background: var(--panel);
      }
      a.noderow2 {
        text-decoration: none;
        color: var(--fg);
        border-radius: 4px;
      }

      /* --- overview search + status filter --- */
      .filterbar {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin: 0.75rem 0 0.75rem;
        flex-wrap: wrap;
      }
      .search-wrap {
        position: relative;
        flex: 1 1 16rem;
        max-width: 28rem;
        display: flex;
      }
      .search {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--fg);
        font: inherit;
        padding: 0.4rem 1.8rem 0.4rem 0.6rem;
      }
      .search:focus {
        outline: none;
        border-color: var(--accent);
      }
      .search-clear {
        position: absolute;
        right: 0.35rem;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        align-items: center;
        justify-content: center;
        width: 1.2rem;
        height: 1.2rem;
        border: none;
        border-radius: 50%;
        background: transparent;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1;
        cursor: pointer;
      }
      .search-clear:hover {
        color: var(--fg);
        background: var(--border);
      }
      .chips {
        display: flex;
        gap: 0.25rem;
      }
      .chip {
        font: inherit;
        font-size: 0.8rem;
        color: var(--muted);
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 0.25rem 0.7rem;
        cursor: pointer;
      }
      .chip:hover {
        color: var(--fg);
      }
      .chip.active {
        color: var(--fg);
        background: var(--panel);
        border-color: var(--accent);
      }

      /* --- node drill-down: datasets-held table --- */
      .ntrow,
      .ntrow.nthead {
        display: grid;
        grid-template-columns: 1.5fr 4rem 1fr 5rem 6rem 6rem;
        gap: 0.75rem;
        align-items: center;
        padding: 0.4rem 0.6rem;
        font-size: 13px;
        border-bottom: 1px solid rgba(48, 54, 61, 0.5);
      }
      .ntrow.nthead {
        color: var(--muted);
        font-weight: 600;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        border-bottom: 1px solid var(--border);
      }

      /* cross-link from a dataset's per-node row to that node's page */
      a.nodelink {
        text-decoration: none;
        color: var(--fg);
      }
      a.nodelink:hover {
        color: var(--accent);
      }
      .lbl {
        font-size: 0.72rem;
        color: var(--muted);
      }

      .rows {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
      }
      .noderow {
        display: grid;
        grid-template-columns: 18rem 1fr auto;
        align-items: center;
        gap: 0.75rem;
        padding: 1px 0;
      }
      .rowlabel {
        white-space: pre;
        color: var(--fg);
      }
      .noderow.avail .rowlabel {
        color: var(--muted);
      }
      .map {
        display: flex;
        flex-wrap: nowrap;
        gap: 1px;
        min-height: 14px;
      }
      .cell {
        display: inline-block;
        width: 6px;
        height: 14px;
        border-radius: 1px;
      }
      .stored {
        color: var(--muted);
        text-align: right;
        white-space: nowrap;
      }

      .hist {
        list-style: none;
        margin: 0;
        padding: 0;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        color: var(--muted);
      }
      .hist li {
        padding: 1px 0;
      }

      .filerow {
        display: grid;
        grid-template-columns: 2fr 6rem 4rem 5rem 3fr;
        gap: 0.5rem;
        padding: 2px 0;
        font-size: 12.5px;
        border-bottom: 1px solid rgba(48, 54, 61, 0.5);
      }
      .filerow.filehead {
        color: var(--muted);
        font-weight: 600;
        border-bottom: 1px solid var(--border);
      }
      .fnum {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      .fhold {
        color: var(--muted);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      /* --- Swarm (membership reconciliation) screen --- */
      /* A health pill next to each dataset name: green when the tracker's
         membership and the nodes' reports agree, amber/red when they don't. */
      .hpill {
        font-size: 0.75rem;
        font-weight: 600;
        padding: 0.15rem 0.55rem;
        border-radius: 999px;
        border: 1px solid var(--border);
        vertical-align: middle;
      }
      .hpill.ok {
        color: var(--ok);
        border-color: var(--ok);
      }
      .hpill.warn {
        color: #d29922;
        border-color: #d29922;
      }
      .hpill.bad {
        color: var(--bad);
        border-color: var(--bad);
      }
      .memberrow {
        display: grid;
        grid-template-columns: 12rem 4rem 4.5rem 1fr 7rem;
        gap: 0.75rem;
        align-items: center;
        padding: 0.35rem 0.6rem;
        border-bottom: 1px solid rgba(48, 54, 61, 0.5);
        font-size: 13px;
      }
      .memberrow.mhead {
        color: var(--muted);
        font-weight: 600;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        border-bottom: 1px solid var(--border);
      }
      .maddr {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      .mage {
        text-align: right;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }
      /* seed/leech tag on a registered peer, as the tracker classifies it. */
      .mbadge {
        justify-self: start;
        font-size: 0.72rem;
        padding: 0.1rem 0.45rem;
        border-radius: 999px;
        border: 1px solid var(--border);
        color: var(--muted);
      }
      .mbadge.seed {
        color: var(--ok);
        border-color: var(--ok);
      }
      .mbadge.leech {
        color: var(--accent);
        border-color: var(--accent);
      }
      /* Reconciliation verdict for one member: connected / isolated / not seen. */
      .mstatus.ok {
        color: var(--ok);
      }
      .mstatus.warn {
        color: #d29922;
      }
      .mstatus.bad {
        color: var(--bad);
      }
      .mstatus.muted {
        color: var(--muted);
      }
      .msilent {
        margin-top: 0.6rem;
        font-size: 0.8rem;
        color: #d29922;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
